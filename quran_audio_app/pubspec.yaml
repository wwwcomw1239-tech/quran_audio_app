name: quran_audio_app
description: تطبيق القرآن الكريم بصوت الشيخ المنشاوي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Network
  http: ^1.2.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
